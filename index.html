<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Encyclopedia Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="apple-header">
        <div class="header-glow"></div>
        
        <div class="header-content">
            <h1>Aviation <span class="handwriting-accent">Encyclopedia</span></h1>
            <p class="subtitle" id="typewriter-sub">Explore the definitive collection of 100 iconic aircraft, varying across multiple categories.</p>
            
            <div class="search-filter-wrapper">
                <input type="text" id="search-input" placeholder="Search by name, manufacturer, or note..." autocomplete="off">
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="commercial">Commercial</option>
                    <option value="cargo">Cargo</option>
                    <option value="general">General Aviation</option>
                    <option value="military">Military</option>
                </select>
            </div>
        </div>
    </header>

    <main id="aircraft-container" class="cards-grid">
        </main>

    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
